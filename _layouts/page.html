---
layout: default
---

<head>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>

{% include lang-switch-floating.html %}

<div class="page-wrapper">
  <!-- Sidebar - Personal Info Only -->
  <aside class="sidebar">
    <div class="profile-section">
      <img 
        src="{{ site.author.avatar | relative_url }}" 
        alt="{{ site.author.name }}" 
        class="profile-image"
      >
      <h1 class="profile-name">{{ site.author.name }}</h1>
      <p class="profile-title">Developer</p>
      
      <!-- Contact Info in Sidebar -->
      <div class="sidebar-contact">
        <p><i class="fas fa-envelope"></i> <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
        <p><i class="fas fa-map-marker-alt"></i> Shanghai, CN</p>
      </div>
      
      <!-- Social Links -->
      <div class="social-links">
        {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}" class="social-link" title="GitHub" target="_blank">
          <i class="fab fa-github"></i>
        </a>
        {% endif %}
      </div>
    </div>
  </aside>

    <!-- Top Navigation -->
    <nav class="top-nav">
      <a href="/" class="nav-item {% if page.url == '/' %}active{% endif %}" data-i18n="nav.home">Home</a>
      <a href="/about/" class="nav-item {% if page.url contains 'about' %}active{% endif %}" data-i18n="nav.about">About</a>
      <a href="/projects/" class="nav-item {% if page.url contains 'projects' %}active{% endif %}" data-i18n="nav.projects">Projects</a>
      <a href="/skills/" class="nav-item {% if page.url contains 'skills' %}active{% endif %}" data-i18n="nav.skills">Skills</a>
      <a href="/contact/" class="nav-item {% if page.url contains 'contact' %}active{% endif %}" data-i18n="nav.contact">Contact</a>
    </nav>

    <!-- Page Content -->
    <div class="page-content">
      {{ content }}
    </div>
    </footer>
  </main>
</div>

<!-- i18n Script -->
<script src="{{ '/assets/js/i18n.js' | relative_url }}"></script>
</div>
