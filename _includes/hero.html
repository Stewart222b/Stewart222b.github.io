<section class="hero-section">
  <img 
    src="{{ site.author.avatar | relative_url }}" 
    alt="{{ site.author.name }}" 
    class="hero-avatar"
  >
  <h1 class="hero-title">{{ site.author.name }}</h1>
  <p class="hero-subtitle">{{ site.subtitle }}</p>
  <p class="hero-description">{{ site.author.bio | replace: '**', '' }}</p>
  <a href="#about" class="hero-cta"><span data-i18n="hero.cta">Learn More</span></a>
</section>
