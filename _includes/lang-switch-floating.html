<!-- Language Switcher - Floating Button Style -->
<div class="lang-switch-floating">
  <button class="lang-btn" data-lang="en">EN</button>
  <button class="lang-btn" data-lang="zh">中文</button>
</div>

<style>
.lang-switch-floating {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  gap: 4px;
  background: var(--page-background, #fff);
  padding: 6px;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
}

.lang-btn {
  background: transparent;
  border: 1px solid var(--border-color, #e0e0e0);
  color: var(--text-color, #1a1a1a);
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  transition: all 0.2s ease;
}

.lang-btn:hover {
  background: var(--link-color, #007bff);
  border-color: var(--link-color, #007bff);
  color: #fff;
}

.lang-btn.active {
  background: var(--link-color, #007bff);
  border-color: var(--link-color, #007bff);
  color: #fff;
}
</style>

<script>
(function() {
  'use strict';
  
  const STORAGE_KEY = 'portfolio-lang';
  const DEFAULT_LANG = 'en';
  
  function getCurrentLang() {
    return localStorage.getItem(STORAGE_KEY) || DEFAULT_LANG;
  }
  
  function setLanguage(lang) {
    localStorage.setItem(STORAGE_KEY, lang);
    document.documentElement.lang = lang;
    applyTranslations(lang);
    updateButtons(lang);
  }
  
  function updateButtons(lang) {
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }
  
  async function loadTranslations(lang) {
    try {
      const response = await fetch('/assets/i18n/' + lang + '.json');
      if (!response.ok) throw new Error('Failed to load');
      return await response.json();
    } catch (e) {
      console.error('Translation error:', e);
      return null;
    }
  }
  
  async function applyTranslations(lang) {
    const t = await loadTranslations(lang);
    if (!t) return;
    
    // Text content
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const keys = el.dataset.i18n.split('.');
      let val = t;
      for (const k of keys) val = val?.[k];
      if (val) el.textContent = val;
    });
    
    // HTML content
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const keys = el.dataset.i18nHtml.split('.');
      let val = t;
      for (const k of keys) val = val?.[k];
      if (val) el.innerHTML = val;
    });
    
    // Title
    if (t.site?.title) document.title = t.site.title;
  }
  
  function init() {
    const lang = getCurrentLang();
    document.documentElement.lang = lang;
    updateButtons(lang);
    applyTranslations(lang);
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const newLang = this.dataset.lang;
        if (newLang !== getCurrentLang()) {
          setLanguage(newLang);
        }
      });
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
